name: Build and Push Docker image (Production)

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v2

      - name: Get version from package.json
        id: get_version
        run: echo "VERSION=$(jq -r .version package.json)" >> $GITHUB_ENV

      # Login to Gitea Package Registry
      - name: Login to Gitea Package Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v2
        with:
          registry: git.wizewerx.tech
          username: build-bot
          password: ${{ secrets.BUILD_BOT_TOKEN }}      
          
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: git.wizewerx.tech/${{ github.repository }}:${{ github.ref_name }}
          cache-from: type=registry,ref=git.wizewerx.tech/${{ github.repository }}:${{ github.ref_name }}
          build-args: |
            GEM_CACHE=git.wizewerx.tech/${{ github.repository }}:${{ github.ref_name }}